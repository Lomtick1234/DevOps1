apiVersion: apps/v1
kind: Deployment
metadata:
    name: deployment
    labels:
        service: kube-service
spec:
    replicas: 2
    selector:
        matchLabels:
            app: kube-app
    template:
        metadata:
            labels:
                app: kube-app
        spec:
            containers:
                - name: kube-app
                  image: thatonetoaster/kube-app:v1
                  env:
                  - name: DB_NAME
                    valueFrom:
                        secretKeyRef:
                            name: postgres-secret
                            key: db
                  - name: DB_USER
                    valueFrom:
                        secretKeyRef:
                            name: postgres-secret
                            key: user
                  - name: DB_PASS
                    valueFrom:
                        secretKeyRef:
                            name: postgres-secret
                            key: pass
                  - name: DB_URL
                    value: "postgres://$(DB_USER):$(DB_PASS)@postgres-service:5432/$(DB_NAME)"
                  envFrom:
                      - configMapRef:
                            name: kube-config-map
